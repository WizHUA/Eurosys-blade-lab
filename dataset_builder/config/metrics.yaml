  schedstat_running_rate:
    description: "调度运行时间"
    query: 'rate(node_schedstat_running_seconds_total[1m])'
    
  schedstat_waiting_rate:
    description: "调度等待时间"
    query: 'rate(node_schedstat_waiting_seconds_total[1m])'

# 监控配置
config:
  prometheus_url: "http://localhost:9090"
  default_interval: 15  # 秒
  query_timeout: 30     # 秒